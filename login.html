<!DOCTYPE html>
<html>

<head>

    <title>Chat</title>

    <link href="https://cdn.jsdeliver.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { 
            font-family: sans-serif; 
            background-color: #ffe6f2; 
            text-align: center; padding: 20px; 
        }
        
        .card { 
        background: white; 
        padding: 25px; 
        border-radius: 20px; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
        max-width: 350px; 
        margin: auto; 
        }
        
        input { 
        padding: 12px; 
        margin: 8px 0; 
        border: 1px solid #ff69b4; 
        border-radius: 10px; 
        width: 95%; 
        box-sizing: border-box; 
        }
    
        button { 
            padding: 12px; 
            width: 100%; 
            background-color: #ff69b4; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            margin-top: 10px; 
            cursor: pointer; 
        }
       
        .btn-alt { 
            background-color: #fce4ec; 
            color: #ad1457; 
            border: 1px solid #ff69b4; 
        }
    
    .hidden { display: none; }
    </style>
</head>

<body>
    
<div class="card p-4 shadow" style="width: 350px;">

    <h3 class="text-center">Connexion</h3>

    <input id="email" class="form-control mt-3" placeholder="email">

    <input id="password" type="password" class="form-control mt-2" placeholder="Mot de passe">

    <button onclick="login()" class="btn btn-primary w-100">Se connecter</button>

    <button onclick="register()" class="btn btn-outline-primary w-100 mt-2">Inscription</button>

</div>

<script type="module" src="auth.js"></script>

</body>

</html>
