<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - WebChat</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    font-family: sans-serif;
    background-color: #ffe6f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card{
    padding:25px;
    border-radius:20px;
    width:350px;
}
</style>
</head>

<body>

<div class="card shadow">
<h3 class="text-center">Connexion</h3>

<input id="pseudo" class="form-control mt-2" placeholder="Pseudo">
<input id="email" class="form-control mt-2" placeholder="Email">
<input id="password" type="password" class="form-control mt-2" placeholder="Mot de passe">

<button onclick="login()" class="btn btn-primary w-100 mt-3">Se connecter</button>
<button onclick="register()" class="btn btn-outline-primary w-100 mt-2">Inscription</button>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
